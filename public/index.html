const api = {
  async getContacts() {
    const r = await fetch("/api/contacts"); return r.json();
  },
  async getInteractions() {
    const r = await fetch("/api/interactions"); return r.json();
  },
  async createContact(c) {
    const r = await fetch("/api/contacts", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(c) });
    return r.json();
  },
  async updateContact(c) {
    const r = await fetch(`/api/contacts/${c.id}`, { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(c) });
    return r.json();
  },
  async deleteContact(id) {
    await fetch(`/api/contacts/${id}`, { method: "DELETE" });
  },
  async createInteraction(i) {
    const r = await fetch("/api/interactions", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(i) });
    return r.json();
  },
  async seed(data) {
    const r = await fetch("/api/seed", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(data) });
    return r.json();
  },
  async reset() {
    await fetch("/api/reset", { method: "POST" });
  }
};

const Tag = ({ children, color = COL.pri }) => (
  <span style={{ display: "inline-flex", alignItems: "center", padding: "2px 8px", borderRadius: "9999px", fontSize: "10px", fontWeight: 500, color, background: color + "12", whiteSpace: "nowrap", fontFamily: FONT }}>{children}</span>
);

const Dot = ({ color }) => <span style={{ width: 7, height: 7, borderRadius: "50%", background: color, display: "inline-block", flexShrink: 0 }} />;

function Btn({ children, variant = "default", size = "sm", onClick, disabled, style = {} }) {
  const styles = {
    primary: { bg: COL.pri, border: COL.pri, color: "#fff" },
    danger: { bg: "transparent", border: COL.red + "44", color: COL.red },
    ghost: { bg: "transparent", border: "transparent", color: COL.mid },
    default: { bg: "transparent", border: COL.border, color: COL.mid },
  };
  const v = styles[variant];
  const pad = size === "xs" ? "3px 8px" : size === "sm" ? "5px 12px" : "8px 18px";
  const fs = size === "xs" ? "10px" : size === "sm" ? "11px" : "12px";
  return <button onClick={onClick} disabled={disabled} style={{ padding: pad, borderRadius: "6px", fontSize: fs, fontWeight: 500, cursor: disabled ? "not-allowed" : "pointer", border: `1px solid ${v.border}`, background: v.bg, color: v.color, fontFamily: FONT, opacity: disabled ? 0.4 : 1, transition: "all .12s", lineHeight: 1.4, ...style }}>{children}</button>;
}

const iStyle = { background: COL.card, border: `1px solid ${COL.border}`, borderRadius: "6px", padding: "7px 10px", color: COL.text, fontSize: "13px", fontFamily: FONT, outline: "none", width: "100%", boxSizing: "border-box", transition: "border-color .15s" };
const sStyle = { ...iStyle, cursor: "pointer" };

function Inp({ label, ...p }) {
  return <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
    {label && <label style={{ fontSize: "11px", color: COL.mid, fontWeight: 500 }}>{label}</label>}
    <input {...p} style={{ ...iStyle, ...(p.style || {}) }} onFocus={e => e.target.style.borderColor = COL.pri} onBlur={e => e.target.style.borderColor = COL.border} />
  </div>;
}
function Sel({ label, options, ...p }) {
  return <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
    {label && <label style={{ fontSize: "11px", color: COL.mid, fontWeight: 500 }}>{label}</label>}
    <select {...p} style={sStyle}>{options.map(o => <option key={typeof o === "string" ? o : o.value} value={typeof o === "string" ? o : o.value}>{typeof o === "string" ? o : o.label}</option>)}</select>
  </div>;
}
function Txt({ label, ...p }) {
  return <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
    {label && <label style={{ fontSize: "11px", color: COL.mid, fontWeight: 500 }}>{label}</label>}
    <textarea {...p} style={{ ...iStyle, resize: "vertical", minHeight: 50, ...(p.style || {}) }} onFocus={e => e.target.style.borderColor = COL.pri} onBlur={e => e.target.style.borderColor = COL.border} />
  </div>;
}
function Chk({ label, checked, onChange }) {
  return <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: "12px", color: COL.mid, cursor: "pointer" }}><input type="checkbox" checked={checked} onChange={onChange} style={{ accentColor: COL.pri }} />{label}</label>;
}

function Section({ title, defaultOpen = true, count, children }) {
  const [open, setOpen] = useState(defaultOpen);
  return <div style={{ borderBottom: `1px solid ${COL.borderSoft}`, paddingBottom: open ? 14 : 0, marginBottom: 10 }}>
    <button onClick={() => setOpen(!open)} style={{ display: "flex", alignItems: "center", gap: 6, width: "100%", background: "none", border: "none", cursor: "pointer", padding: "6px 0", fontFamily: FONT }}>
      <span style={{ fontSize: "10px", color: COL.light, transition: "transform .15s", transform: open ? "rotate(90deg)" : "rotate(0)" }}>▶</span>
      <span style={{ fontSize: "12px", fontWeight: 600, color: COL.text }}>{title}</span>
      {count !== undefined && <span style={{ fontSize: "10px", color: COL.light }}>({count})</span>}
    </button>
    {open && <div style={{ paddingTop: 8 }}>{children}</div>}
  </div>;
}

// MODAL
// ═══════════════════════════════════════════════════════════

function Modal({ open, onClose, title, children, width = 640 }) {
  if (!open) return null;
  return <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.18)", backdropFilter: "blur(3px)", display: "flex", alignItems: "flex-start", justifyContent: "center", zIndex: 1000, paddingTop: "5vh", overflowY: "auto" }}>
    <div onClick={e => e.stopPropagation()} style={{ background: COL.card, borderRadius: "12px", width: `min(${width}px, 94vw)`, maxHeight: "88vh", overflow: "auto", boxShadow: "0 12px 40px rgba(0,0,0,.12)", marginBottom: "5vh" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "16px 20px", borderBottom: `1px solid ${COL.borderSoft}`, position: "sticky", top: 0, background: COL.card, zIndex: 1, borderRadius: "12px 12px 0 0" }}>
        <span style={{ fontSize: "15px", fontWeight: 600, color: COL.text }}>{title}</span>
        <button onClick={onClose} style={{ background: "none", border: "none", color: COL.light, cursor: "pointer", fontSize: "18px", lineHeight: 1 }}>×</button>
      </div>
      <div style={{ padding: "16px 20px" }}>{children}</div>
    </div>
  </div>;
}

}

function Pipeline({ contacts, onSelect, onStageChange }) {
  const [dragId, setDragId] = useState(null);
  const [dragOver, setDragOver] = useState(null);
  const byStage = useMemo(() => {
    const m = {}; STAGES.forEach(s => m[s] = []);
    contacts.forEach(c => { if (m[c.stage]) m[c.stage].push(c) });
    return m;
  }, [contacts]);

  const handleDragStart = (e, contactId) => { setDragId(contactId); e.dataTransfer.effectAllowed = "move"; };
  const handleDragEnd = () => { setDragId(null); setDragOver(null); };
  const handleDragOver = (e, stage) => { e.preventDefault(); e.dataTransfer.dropEffect = "move"; setDragOver(stage); };
  const handleDragLeave = () => { setDragOver(null); };
  const handleDrop = (e, stage) => { e.preventDefault(); setDragOver(null); if (dragId) { onStageChange(dragId, stage); setDragId(null); } };

  return <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 8 }}>
    {STAGES.map(stage => {
      const sc = STAGE_COLOR(stage);
      const items = byStage[stage];
      const isOver = dragOver === stage;
      if (items.length === 0 && !dragId) return <div key={stage} style={{ flex: "1 0 110px", minWidth: 110, borderTop: `3px solid ${sc}30`, background: COL.card, borderRadius: "8px", padding: "8px 6px", opacity: 0.5 }}>
        <div style={{ fontSize: "9px", color: sc, fontWeight: 600, textTransform: "uppercase", letterSpacing: ".5px" }}>{STAGE_SHORT[stage]}</div>
      </div>;
      return <div key={stage}
        onDragOver={e => handleDragOver(e, stage)} onDragLeave={handleDragLeave} onDrop={e => handleDrop(e, stage)}
        style={{ flex: "1 0 140px", minWidth: 140, borderTop: `3px solid ${sc}`, background: isOver ? sc + "12" : COL.card, border: `1px solid ${isOver ? sc + "44" : COL.borderSoft}`, borderRadius: "8px", padding: "8px 6px", transition: "background .15s, border-color .15s", minHeight: 60 }}>
        <div style={{ fontSize: "9px", color: sc, fontWeight: 600, textTransform: "uppercase", letterSpacing: ".5px", marginBottom: 6 }}>{STAGE_SHORT[stage]} <span style={{ color: COL.light }}>({items.length})</span></div>
        {items.map(c => <div key={c.id} draggable onDragStart={e => handleDragStart(e, c.id)} onDragEnd={handleDragEnd}
          onClick={() => onSelect(c)}
          style={{ padding: "7px 8px", background: dragId === c.id ? sc + "18" : COL.bg, borderRadius: "6px", marginBottom: 3, cursor: dragId ? "grabbing" : "grab", border: `1px solid ${dragId === c.id ? sc + "44" : "transparent"}`, transition: "all .12s", opacity: dragId === c.id ? 0.7 : 1, userSelect: "none" }}
          onMouseEnter={e => { if (!dragId) { e.currentTarget.style.borderColor = sc + "44"; e.currentTarget.style.boxShadow = "0 2px 6px rgba(0,0,0,.04)"; } }}
          onMouseLeave={e => { if (!dragId) { e.currentTarget.style.borderColor = "transparent"; e.currentTarget.style.boxShadow = "none"; } }}>
          <div style={{ fontSize: "12px", fontWeight: 600, color: COL.text, marginBottom: 1 }}>{c.name}</div>
          <div style={{ fontSize: "10px", color: COL.light }}>{c.company || "\u2014"}</div>
          {c.nextStep && <div style={{ fontSize: "10px", color: COL.pri, marginTop: 3 }}>\u2192 {c.nextStep}</div>}
        </div>)}
        {isOver && items.length === 0 && <div style={{ padding: "12px 8px", textAlign: "center", fontSize: "10px", color: sc, opacity: 0.6 }}>Drop here</div>}
      </div>;
    })}
  </div>;
}

function StatBox({ label, value, color = COL.pri }) {
  return <div style={{ background: COL.card, borderRadius: "10px", border: `1px solid ${COL.borderSoft}`, padding: "14px 16px", textAlign: "center" }}>
    <div style={{ fontSize: "24px", fontWeight: 700, color, fontFamily: MONO }}>{value}</div>
    <div style={{ fontSize: "10px", color: COL.light, marginTop: 2 }}>{label}</div>
  </div>;
}

function Dashboard({ data }) {
  const { contacts: cx, interactions: ix } = data;
  const weekAgo = Date.now() - 7 * 864e5;

  const newW = cx.filter(c => new Date(c.createdAt) >= weekAgo).length;
  const introsReq = ix.filter(i => i.type === "Intro Request" && new Date(i.date) >= weekAgo).length;
  const introsRec = ix.filter(i => i.type === "Intro Received" && new Date(i.date) >= weekAgo).length;
  const emails = ix.filter(i => i.type === "Email" && new Date(i.date) >= weekAgo).length;
  const meetings = ix.filter(i => i.type === "Meeting" && new Date(i.date) >= weekAgo).length;
  const dd = cx.filter(c => c.stage === "Diligence").length;
  const stalled = cx.filter(c => { const d = dAgo(c.lastTouchDate); return d !== null && d > 7 && !["Passed", "Dormant / Revisit", "Committed"].includes(c.stage); });
  const soft = cx.filter(c => c.stage === "Soft Circled").reduce((s, c) => s + (parseFloat(c.expectedCheck) || 0), 0);
  const committed = cx.filter(c => c.stage === "Committed").reduce((s, c) => s + (parseFloat(c.expectedCheck) || 0), 0);
  const conf = { h: 0, m: 0, l: 0 };
  cx.forEach(c => { if (["Passed", "Dormant / Revisit"].includes(c.stage)) return; const v = parseFloat(c.expectedCheck) || 0; if (c.confidence?.includes(">70")) conf.h += v; else if (c.confidence?.includes("30-70")) conf.m += v; else conf.l += v; });
  const active = cx.filter(c => c.lastTouchDate && !["Passed", "Dormant / Revisit", "Committed"].includes(c.stage));
  const avgTouch = active.length ? Math.round(active.reduce((s, c) => s + dAgo(c.lastTouchDate), 0) / active.length) : 0;
  const nextActs = cx.filter(c => c.nextStep && !["Passed", "Dormant / Revisit"].includes(c.stage)).sort((a, b) => { if (!a.nextStepDue) return 1; if (!b.nextStepDue) return -1; return new Date(a.nextStepDue) - new Date(b.nextStepDue); }).slice(0, 10);
  const passR = {}; cx.filter(c => c.passReason).forEach(c => { passR[c.passReason] = (passR[c.passReason] || 0) + 1; });
  const topP = Object.entries(passR).sort((a, b) => b[1] - a[1]).slice(0, 5);

  return <div>
    <div style={{ fontSize: "16px", fontWeight: 700, color: COL.text, marginBottom: 16 }}>Weekly Dashboard</div>

    <div style={{ fontSize: "11px", fontWeight: 600, color: COL.light, textTransform: "uppercase", letterSpacing: ".5px", marginBottom: 8 }}>Activity This Week</div>
    <div style={{ display: "grid", gridTemplateColumns: "repeat(5,1fr)", gap: 8, marginBottom: 20 }}>
      <StatBox label="New Contacts" value={newW} />
      <StatBox label="Intros Req" value={introsReq} />
      <StatBox label="Intros Rec" value={introsRec} color={COL.green} />
      <StatBox label="Outreach Sent" value={emails} />
      <StatBox label="Meetings" value={meetings} color={COL.amber} />
    </div>

    <div style={{ fontSize: "11px", fontWeight: 600, color: COL.light, textTransform: "uppercase", letterSpacing: ".5px", marginBottom: 8 }}>Pipeline Health</div>
    <div style={{ display: "grid", gridTemplateColumns: "repeat(5,1fr)", gap: 8, marginBottom: 20 }}>
      <StatBox label="Active DD" value={dd} color={COL.amber} />
      <StatBox label="Avg Days Since Touch" value={avgTouch} color={avgTouch > 7 ? COL.red : COL.green} />
      <StatBox label="Stalled >7d" value={stalled.length} color={stalled.length ? COL.red : COL.green} />
      <StatBox label="Soft Circled" value={fmt$(soft)} color={COL.green} />
      <StatBox label="Committed" value={fmt$(committed)} color={COL.green} />
    </div>

    <div style={{ fontSize: "11px", fontWeight: 600, color: COL.light, textTransform: "uppercase", letterSpacing: ".5px", marginBottom: 8 }}>Capital by Confidence</div>
    <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 8, marginBottom: 20 }}>
      <StatBox label="High (>70%)" value={fmt$(conf.h)} color={COL.green} />
      <StatBox label="Medium (30-70%)" value={fmt$(conf.m)} color={COL.amber} />
      <StatBox label="Low (<30%)" value={fmt$(conf.l)} color={COL.light} />
    </div>

    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
      <div style={{ background: COL.card, borderRadius: "10px", border: `1px solid ${COL.borderSoft}`, padding: "16px 20px" }}>
        <div style={{ fontSize: "13px", fontWeight: 600, color: COL.text, marginBottom: 10 }}>Top 10 Next Actions</div>
        {nextActs.length === 0 ? <div style={{ color: COL.light, fontSize: "12px" }}>No actions queued.</div> :
          nextActs.map(c => <div key={c.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 0", borderBottom: `1px solid ${COL.borderSoft}`, fontSize: "12px" }}>
            <div><span style={{ fontWeight: 600, color: COL.text }}>{c.name}</span> <span style={{ color: COL.light }}>→ {c.nextStep}</span></div>
            {c.nextStepDue && <Tag color={new Date(c.nextStepDue) < new Date() ? COL.red : COL.pri}>{fmtD(c.nextStepDue)}</Tag>}
          </div>)
        }
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        {stalled.length > 0 && <div style={{ background: COL.amberSoft, borderRadius: "10px", border: `1px solid ${COL.amber}20`, padding: "14px 18px" }}>
          <div style={{ fontSize: "12px", fontWeight: 600, color: COL.amber, marginBottom: 6 }}>Stalled Contacts ({stalled.length})</div>
          {stalled.slice(0, 6).map(c => <div key={c.id} style={{ fontSize: "12px", color: COL.text, marginBottom: 2 }}>{c.name} — <span style={{ color: COL.light }}>{dAgo(c.lastTouchDate)}d, {STAGE_SHORT[c.stage]}</span></div>)}
        </div>}
        {topP.length > 0 && <div style={{ background: COL.card, borderRadius: "10px", border: `1px solid ${COL.borderSoft}`, padding: "14px 18px" }}>
          <div style={{ fontSize: "12px", fontWeight: 600, color: COL.text, marginBottom: 6 }}>Pass Reasons</div>
          {topP.map(([r, n]) => <div key={r} style={{ display: "flex", justifyContent: "space-between", fontSize: "12px", marginBottom: 2 }}>
            <span style={{ color: COL.mid }}>{r}</span><span style={{ color: COL.light, fontFamily: MONO }}>{n}</span>
          </div>)}
        </div>}
      </div>
    </div>
  </div>;
}

// ═══════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════

function App() {
  const [data, setData] = useState({ contacts: [], interactions: [] });
  const [loading, setLoading] = useState(true);
  const [view, setView] = useState("list");
  const [selId, setSelId] = useState(null);
  const [search, setSearch] = useState("");
  const [filter, setFilter] = useState("all"); // all, active, tier1, needsAction, stale
  const [showAdd, setShowAdd] = useState(false);
  const [editC, setEditC] = useState(null);

  useEffect(() => {
    (async () => {
      try {
        const [contacts, interactions] = await Promise.all([api.getContacts(), api.getInteractions()]);
        if (contacts.length > 0) { setData({ contacts, interactions }); setLoading(false); return; }
      } catch (e) {}
      // Seed if empty
      const seed = buildSeedData();
      try { await api.seed(seed); } catch(e) {}
      setData(seed);
      setLoading(false);
    })();
  }, []);

  const reload = async () => {
    const [contacts, interactions] = await Promise.all([api.getContacts(), api.getInteractions()]);
    setData({ contacts, interactions });
  };
  const addC = async f => { const c = { ...f, id: uid(), createdAt: new Date().toISOString() }; await api.createContact(c); await reload(); setShowAdd(false); };
  const updC = async f => { await api.updateContact(f); await reload(); setEditC(null); };
  const delC = async id => { if (!confirm("Delete this contact?")) return; await api.deleteContact(id); await reload(); setSelId(null); setView("list"); };
  const addI = async f => { const i = { ...f, id: uid(), createdAt: new Date().toISOString() }; await api.createInteraction(i); await reload(); };
  const stageChange = async (contactId, newStage) => {
    const contact = data.contacts.find(c => c.id === contactId);
    if (!contact || contact.stage === newStage) return;
    await api.updateContact({ ...contact, stage: newStage, stageEntryDate: td() });
    await reload();
  };
  const updateNotes = async (contactId, fields) => {
    const contact = data.contacts.find(c => c.id === contactId);
    if (!contact) return;
    await api.updateContact({ ...contact, ...fields });
    await reload();
  };

  const filtered = useMemo(() => {
    let l = data.contacts;
    if (filter === "active") l = l.filter(c => !["Passed", "Dormant / Revisit", "Target Identified"].includes(c.stage));
    if (filter === "tier1") l = l.filter(c => c.tier === "Tier 1");
    if (filter === "needsAction") l = l.filter(c => c.nextStep && !["Passed", "Dormant / Revisit"].includes(c.stage));
    if (filter === "stale") l = l.filter(c => { const d = dAgo(c.lastTouchDate); return d !== null && d > 7 && !["Passed", "Dormant / Revisit", "Committed"].includes(c.stage); });
    if (filter === "needsInfo") l = l.filter(c => (c.tags || "").includes("needs-info") || (c.notes || "").includes("⚠️"));
    if (search) { const q = search.toLowerCase(); l = l.filter(c => c.name.toLowerCase().includes(q) || (c.company || "").toLowerCase().includes(q) || (c.tags || "").toLowerCase().includes(q)); }
    return l.sort((a, b) => {
      const ta = TIERS.indexOf(a.tier), tb = TIERS.indexOf(b.tier);
      if (ta !== tb) return ta - tb;
      return a.name.localeCompare(b.name);
    });
  }, [data.contacts, filter, search]);

  const sel = data.contacts.find(c => c.id === selId);
  const selInts = data.interactions.filter(i => i.contactId === selId);
  const counts = useMemo(() => {
    const c = data.contacts;
    return {
      all: c.length,
      active: c.filter(x => !["Passed", "Dormant / Revisit", "Target Identified"].includes(x.stage)).length,
      tier1: c.filter(x => x.tier === "Tier 1").length,
      needsAction: c.filter(x => x.nextStep && !["Passed", "Dormant / Revisit"].includes(x.stage)).length,
      stale: c.filter(x => { const d = dAgo(x.lastTouchDate); return d !== null && d > 7 && !["Passed", "Dormant / Revisit", "Committed"].includes(x.stage); }).length,
      needsInfo: c.filter(x => (x.tags || "").includes("needs-info") || (x.notes || "").includes("⚠️")).length,
    };
  }, [data.contacts]);

  if (loading) return <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", background: COL.bg, color: COL.light, fontFamily: FONT }}>Loading...</div>;

  return <div style={{ fontFamily: FONT, background: COL.bg, color: COL.text, minHeight: "100vh" }}>
    

    {/* Top bar */}
    <div style={{ padding: "10px 20px", background: COL.card, borderBottom: `1px solid ${COL.border}`, display: "flex", justifyContent: "space-between", alignItems: "center", position: "sticky", top: 0, zIndex: 100 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 20 }}>
        <div style={{ borderRadius: "8px", overflow: "hidden", display: "flex", alignItems: "center", background: "#0f0d2e", padding: "6px 12px" }}>
          <img src={LOGO_SRC} alt="PointSet Technologies" style={{ height: 28, objectFit: "contain" }} />
        </div>
        {/* Main nav */}
        <div style={{ display: "flex", gap: 2 }}>
          {[{ k: "list", l: "Contacts" }, { k: "pipeline", l: "Pipeline" }, { k: "dashboard", l: "Dashboard" }].map(t =>
            <button key={t.k} onClick={() => { setView(t.k); setSelId(null); }}
              style={{ padding: "6px 14px", borderRadius: "6px", fontSize: "13px", fontWeight: view === t.k ? 600 : 400, cursor: "pointer", border: "none", background: view === t.k ? COL.priSoft : "transparent", color: view === t.k ? COL.priText : COL.mid, fontFamily: FONT, transition: "all .12s" }}>
              {t.l}
            </button>
          )}
        </div>
      </div>
      <Btn variant="primary" size="sm" onClick={() => setShowAdd(true)}>+ Add contact</Btn>
    </div>

    <div style={{ padding: "16px 20px", maxWidth: 1100, margin: "0 auto" }}>

      {view === "detail" && sel ?
        <Detail contact={sel} interactions={selInts} onEdit={() => setEditC(sel)} onDelete={() => delC(sel.id)} onAddInt={addI} onBack={() => setView("list")} onUpdateNotes={updateNotes} />

      : view === "pipeline" ?
        <Pipeline contacts={filtered} onSelect={c => { setSelId(c.id); setView("detail"); }} onStageChange={stageChange} />

      : view === "dashboard" ?
        <Dashboard data={data} />

      : /* LIST */
      <div>
        {/* Search + filters */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, flexWrap: "wrap", gap: 8 }}>
          <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
            {[
              { k: "all", l: `All (${counts.all})` },
              { k: "active", l: `Active (${counts.active})` },
              { k: "tier1", l: `Tier 1 (${counts.tier1})` },
              { k: "needsAction", l: `Needs Action (${counts.needsAction})` },
              { k: "stale", l: `Stale (${counts.stale})` },
              { k: "needsInfo", l: `⚠️ Needs Info (${counts.needsInfo})` },
            ].map(f => <button key={f.k} onClick={() => setFilter(f.k)}
              style={{ padding: "4px 10px", borderRadius: "6px", fontSize: "11px", fontWeight: filter === f.k ? 600 : 400, cursor: "pointer", border: `1px solid ${filter === f.k ? COL.pri + "33" : "transparent"}`, background: filter === f.k ? COL.priSoft : "transparent", color: filter === f.k ? COL.priText : COL.mid, fontFamily: FONT }}>
              {f.l}
            </button>)}
          </div>
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search name, company, tag..."
            style={{ ...iStyle, width: 220, fontSize: "12px", padding: "6px 10px" }} />
        </div>

        {/* Contact cards */}
        {filtered.length === 0 ?
          <div style={{ textAlign: "center", padding: "50px 0", color: COL.light }}>
            <div style={{ fontSize: "28px", marginBottom: 6 }}>◆</div>
            <div style={{ fontSize: "13px" }}>No contacts match this filter.</div>
          </div>
        :
          <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
            {filtered.map(c => {
              const sc = STAGE_COLOR(c.stage);
              const stale = dAgo(c.lastTouchDate);
              const isStale = stale !== null && stale > 7 && !["Passed", "Dormant / Revisit", "Committed"].includes(c.stage);
              const warn = c.notes?.includes("⚠️") || c.company?.includes("⚠️");
              const ic = data.interactions.filter(i => i.contactId === c.id).length;
              return <div key={c.id} onClick={() => { setSelId(c.id); setView("detail"); }}
                style={{ display: "flex", alignItems: "center", gap: 14, padding: "12px 16px", background: warn ? "#fffdf5" : COL.card, borderRadius: "8px", cursor: "pointer", border: `1px solid ${COL.borderSoft}`, transition: "all .12s" }}
                onMouseEnter={e => { e.currentTarget.style.borderColor = COL.border; e.currentTarget.style.boxShadow = "0 2px 8px rgba(0,0,0,.03)"; }}
                onMouseLeave={e => { e.currentTarget.style.borderColor = COL.borderSoft; e.currentTarget.style.boxShadow = "none"; }}>

                {/* Tier dot */}
                <Dot color={c.tier === "Tier 1" ? COL.pri : c.tier === "Tier 2" ? COL.amber : COL.faint} />

                {/* Name + company */}
                <div style={{ flex: "1 1 200px", minWidth: 0 }}>
                  <div style={{ fontSize: "13px", fontWeight: 600, color: COL.text, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                    {c.name} {warn && "⚠️"}
                    {ic > 0 && <span style={{ color: COL.light, fontWeight: 400, fontSize: "11px", marginLeft: 4 }}>({ic})</span>}
                  </div>
                  <div style={{ fontSize: "11px", color: COL.light, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                    {c.company?.replace("⚠️ Unknown — confirm affiliation", "?") || c.title || "—"}
                  </div>
                </div>

                {/* Stage */}
                <div style={{ flex: "0 0 auto" }}><Tag color={sc}>{STAGE_SHORT[c.stage]}</Tag></div>

                {/* Next step preview */}
                <div style={{ flex: "1 1 180px", minWidth: 0, display: "flex", alignItems: "center", gap: 4 }}>
                  {c.nextStep ? <>
                    <span style={{ fontSize: "11px", color: COL.pri, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>→ {c.nextStep}</span>
                    {c.nextStepDue && <span style={{ fontSize: "10px", color: new Date(c.nextStepDue) < new Date() ? COL.red : COL.light, fontFamily: MONO, flexShrink: 0 }}>{fmtD(c.nextStepDue)}</span>}
                  </> : <span style={{ fontSize: "11px", color: COL.faint }}>No next step</span>}
                </div>

                {/* Status indicators */}
                <div style={{ flex: "0 0 auto", display: "flex", gap: 4, alignItems: "center" }}>
                  {isStale && <Tag color={COL.amber}>{stale}d</Tag>}
                  {c.priority === "High" && <Dot color={COL.red} />}
                </div>
              </div>;
            })}
          </div>
        }
      </div>}
    </div>

    <Modal open={showAdd} onClose={() => setShowAdd(false)} title="Add Contact">
      <ContactForm onSave={addC} onCancel={() => setShowAdd(false)} />
    </Modal>
    <Modal open={!!editC} onClose={() => setEditC(null)} title="Edit Contact">
      {editC && <ContactForm contact={editC} onSave={f => { updC(f); setEditC(null); }} onCancel={() => setEditC(null)} />}
    </Modal>
  </div>;
}

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));

</script>
</body>
</html>
